security:
    password_hashers:
        App\Entity\Users: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Users
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: admin_login
                check_path: admin_login_check
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
                csrf_parameter: _csrf_token
                csrf_token_id: authenticate
                default_target_path: /
                always_use_default_target_path: true
                use_referer: false
                success_handler: App\Security\LoginSuccessHandler
            logout:
                path: admin_logout
                target: /
                invalidate_session: true
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                always_remember_me: false



    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]



    access_control:
        - { path: ^/admin/login$,       roles: PUBLIC_ACCESS }
        - { path: ^/admin/logout,       roles: ROLE_USER }
        - { path: ^/admin/profile$,     roles: ROLE_USER }
        - { path: ^/admin/profile/edit, roles: ROLE_USER }
        - { path: ^/admin/profile/\d+,  roles: ROLE_USER }
        - { path: ^/admin,              roles: ROLE_ADMIN }
        - { path: ^/register,           roles: PUBLIC_ACCESS }
        - { path: ^/login,              roles: PUBLIC_ACCESS }
        - { path: ^/$,                  roles: PUBLIC_ACCESS }
        - { path: ^/home,               roles: PUBLIC_ACCESS }
        - { path: ^/destinations,       roles: PUBLIC_ACCESS }
        - { path: ^/hebergements,       roles: PUBLIC_ACCESS }
        - { path: ^/properties,         roles: PUBLIC_ACCESS }
        - { path: ^/contact,            roles: PUBLIC_ACCESS }
        - { path: ^/blog,               roles: PUBLIC_ACCESS }
        - { path: ^/activite$,          roles: PUBLIC_ACCESS }
        - { path: ^/activite/\d+$,      roles: PUBLIC_ACCESS }
        - { path: ^/avis,               roles: PUBLIC_ACCESS }
        - { path: ^/reclamation,        roles: PUBLIC_ACCESS }
        - { path: ^/reservation,        roles: PUBLIC_ACCESS }
        - { path: ^/profile,            roles: ROLE_USER }
        - { path: ^/,                   roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password,  roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
